name: cd
on:
  push:
    branches:
      - main
      - cd-test
env:
  RELATIVE_ARTIFACT_DIR: ../_temp
jobs:
  create_tar:
    name: Create tar of project
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      artifact_dir: ${{ steps.vars.outputs.ARTIFACT_DIR }}
      file_name: ${{ steps.vars.outputs.FILE_NAME }}
      version_name: ${{ steps.vars.outputs.VERSION_NAME }}
      tarbal_id: ${{steps.tarbal.outputs.artifact-id}}
    steps:
      - uses: actions/checkout@v4
      - uses: wy414012/toolchain@master
        with:
          toolchain: stable
      - name: get path
        id: vars
        run: |
          PREV_DIR=$(pwd)
          mkdir -p ${{env.RELATIVE_ARTIFACT_DIR}}
          cd ${{env.RELATIVE_ARTIFACT_DIR}}
          CURR_DIR=$(pwd)
          cd $PREV_DIR
          echo $CURR_DIR
          VERSION_NAME="$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="Iconic") | .version')"
          FILE_NAME=Iconic-$VERSION_NAME.tar.xz
          echo "ARTIFACT_DIR=$CURR_DIR" >> $GITHUB_ENV
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_DIR=$CURR_DIR" >> $GITHUB_OUTPUT
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
      - name: Cache
        uses: actions/cache@v5
        with:
          path: ${{env.ARTIFACT_DIR}}
          key: cache-${{ github.sha }}
      - name: vendor dependencies
        run: |
          cargo vendor > ./config.toml
          mkdir -p .cargo
          cp ./config.toml ./.cargo/config
      - name: create tarbal
        run: |
          VERSION_NAME="$(cargo metadata --quiet --format-version=1 --no-deps | jq -r '.packages[] | select(.name=="Iconic") | .version')"
          FILE_NAME=Iconic-$VERSION_NAME.tar.xz
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

          tar cf "${{env.ARTIFACT_DIR}}/${{env.FILE_NAME}}" .

      - name: create checksum
        run: |
          HASH="$(sha256sum ${{env.ARTIFACT_DIR}}/${{env.FILE_NAME}} | awk '{print $1}')"
          echo $HASH > "${{env.ARTIFACT_DIR}}/${{env.FILE_NAME}}.sha256"
          echo "FILE_HASH=$HASH" >> $GITHUB_ENV
          echo $HASH
      - uses: vafinvr/template-env-action@master
        name: Create release template
        env:
          VERSION: ${{env.VERSION_NAME}}
          HASH: ${{env.FILE_HASH}}
        with:
          filename: ./.github/workflows/nl.emphisia.icon.json
      - name: Move release template to artifact dir
        run: |
          cp ./.github/workflows/nl.emphisia.icon.json ${{env.ARTIFACT_DIR}}/
          ls -lah ${{env.ARTIFACT_DIR}}
      - name: upload artifacts
        uses: actions/upload-artifact@v7
        id: tarbal
        with:
          name: Iconic
          path: ${{env.ARTIFACT_DIR}}/*
      - uses: ncipollo/release-action@v1.21.0
        name: Create release
        with:
          allowUpdates: true
          artifacts: ${{env.ARTIFACT_DIR}}/*
          tag: v${{env.VERSION_NAME}}
          generateReleaseNotes: "body"
          name: v${{env.VERSION_NAME}}

  flatpak:
    name: "create Flatpak"
    needs: [create_tar]
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    steps:
      - uses: actions/download-artifact@v8.0.1
        id: get_artifact
        with:
          artifact-ids: ${{needs.create_tar.outputs.tarbal_id}}
      - name: extract and name
        id: extract
        run: |
          echo ${{steps.get_artifact.outputs.download-path}}
          echo $(pwd)
          echo "$(ls -lah ./)"
          tar xf ${{needs.create_tar.outputs.file_name}}
          echo "$(ls -lah ./)"
          echo "FILE_NAME=Iconic-${{needs.create_tar.outputs.version_name}}-${{ matrix.variant.arch }}.flatpak" >> $GITHUB_ENV
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: ${{env.FILE_NAME}}
          manifest-path: build-aux/nl.emphisia.icon.json
          cache-key: flatpak-builder-${{ github.sha }}
          arch: ${{ matrix.variant.arch }}
          verbose: true
      - name: debug
        run: |
          echo $(ls -lah ./)
      - name: upload_artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.FILE_NAME}}
          path: ${{env.FILE_NAME}}
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [create_tar, flatpak]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8.0.1
      - name: list artifacts
        run: ls -lah ./
      - uses: ncipollo/release-action@v1.21.0
        name: Create release
        with:
          allowUpdates: true
          artifacts: ./*
          tag: v${{needs.create_tar.outputs.version_name}}
          generateReleaseNotes: "body"
          omitBodyDuringUpdate: true
          name: v${{needs.create_tar.outputs.version_name}}
